<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Juan Jesus - Diseno web elegante y profesional para comercios locales." />
    <title>Juan Jesus | Diseno Web Para Comercios Locales</title>

    <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="particles-bg" aria-hidden="true"></div>
    <div class="dynamic-mesh" aria-hidden="true"></div>

    <main class="layout">
        <section class="profile-card">
            <div class="glow glow--one" aria-hidden="true"></div>
            <div class="glow glow--two" aria-hidden="true"></div>

            <header class="hero">
                <figure class="avatar-wrap">
                    <img src="assets/avatar_foto.jpg" alt="Foto de Juan Jesus" class="avatar" width="150" height="150" />
                </figure>

                <p class="kicker">Diseno Web Para Negocios</p>
                <h1 class="name">Juan Jesus</h1>
                <p class="subtitle">Paginas claras y efectivas para negocios que quieren destacar en el mundo digital.</p>
            </header>

            <nav class="links" aria-label="Enlaces principales">
                <a href="https://www.linkedin.com/in/juan-jes%C3%BAs-benito-dequero-671130312" target="_blank" rel="noopener noreferrer" class="link link--primary" aria-label="Abrir perfil de LinkedIn">
                    <span class="link__icon"><i class="fa-brands fa-linkedin-in" aria-hidden="true"></i></span>
                    <span class="link__text">LinkedIn Profesional</span>
                    <span class="link__arrow"><i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i></span>
                </a>

                <a href="https://www.instagram.com/juanje_fotos/" target="_blank" rel="noopener noreferrer" class="link link--ghost" aria-label="Abrir Instagram secundario">
                    <span class="link__icon"><i class="fa-brands fa-instagram" aria-hidden="true"></i></span>
                    <span class="link__text">Instagram de Fotos</span>
                    <span class="link__arrow"><i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i></span>
                </a>

                <a href="https://portfolio-juanjesus.netlify.app" target="_blank" rel="noopener noreferrer" class="link link--gold" aria-label="Abrir portfolio personal">
                    <span class="link__icon"><i class="fa-solid fa-briefcase" aria-hidden="true"></i></span>
                    <span class="link__text">Portfolio Personal</span>
                    <span class="link__arrow"><i class="fa-solid fa-arrow-up-right-from-square" aria-hidden="true"></i></span>
                </a>
            </nav>

            <footer class="meta">
                <p class="meta__line">Webs de alto nivel para marcas locales que quieren destacar.</p>
                <p class="meta__copy">&copy; <span id="year"></span> Juan Jesus</p>
            </footer>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@3/tsparticles.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
